<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<style>
    *{
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif, Helvetica, sans-serif;
        text-align: center;
    }
    div{
        
        background-color: #f2f2f2;
        width: 400px;
        margin: auto;
        padding: 20px;
        border-radius: 10px;
        height: 100vh;
    }
    dt,dd,ul{
        margin: 80px;
    }
    dt{
        font-size: 20px;
    }
    dd{
        font-size: 15px;
    }
    li{
        margin: 20px;
    }
</style>
<body>

    <div>
            <dl>
                <dt>I like This </dt>
        <dt><b>Real Madrid 3m Barcalona</b></dt>
        <details>
            <summary>Why I Like This</summary>
            <dd>Because Real Madrid 3m Alkol</dd>
        </details>

        <dt><b>Real Madrid Castia</b></dt>
        <details>
            <summary>Why I Like This</summary>
            <dd>Because Real Madrid</dd>
        </details>
        <dt><b>Real Madrid Under 16</b></dt>
        <details>
            <summary>Why I Like This</summary>
            <dd>Because I dont know</dd>
        </details>
    </dl>

    <ul>
        <h2>Resturants (Before the War)</h2>
        <li>3beed</li>
        <li>Mohannad</li>
        <li>Everything Else</li>
    </ul>
    </div>

</body>
</html>
